name: Update THM Badge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "spardman"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
